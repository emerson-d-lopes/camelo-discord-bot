name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # Skip native builds and binary downloads (opus, ffmpeg, yt-dlp) — lint
      # and typecheck don't need them.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm lint
      - run: pnpm typecheck
      # Tests transitively import db.ts, so build just the SQLite native addon.
      - run: pnpm rebuild better-sqlite3
      - run: pnpm test
